<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { background: #fff; max-width: 600px; margin: auto; padding: 30px; border-radius: 8px; }
    .btn { display: inline-block; background: #1a1a2e; color: #fff; padding: 12px 24px;
           text-decoration: none; border-radius: 4px; margin-top: 20px; }
    .footer { margin-top: 30px; color: #888; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Password Reset Request</h2>
    <p>We received a request to reset the password for your account.</p>
    <p>Click the button below to reset your password:</p>
    <a href="{{ reset_link }}" class="btn">Reset Password</a>
    <p>This link expires in 1 hour. If you did not request a password reset, ignore this email.</p>
    <div class="footer">Bangladesh Global Newspaper — Newsroom Platform</div>
  </div>
</body>
</html>
